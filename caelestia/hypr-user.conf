# vim: set filetype=hyprlang:
# 修复 caelestia 动画帧率：NVIDIA 驱动需显式开启 threaded 渲染
env = QSG_RENDER_LOOP,threaded


# 光标：SDDM 侧 KWIN_FORCE_SW_CURSOR=1 已从源头解决双光标残留
env = XCURSOR_THEME,Qogir
exec-once = hyprctl setcursor Qogir 24

general {
    # 无限平铺布局
    layout = scrolling
}

bezier = wind, 0.2, 0.8, 0.1, 1.00      # 动画曲线
animations {
    # 默认工作区切换横向动画，改为竖向
    # animation = workspaces, 1, 5, standard
    animation = workspaces, 1, 7, wind, slidevert
}

input {
   # 打开数字小键盘
    numlock_by_default = true

    # 鼠标加速度：flat = 纯线性（和 Windows 关掉"提高指针精确度"一样）
    # adaptive = 有加速（Windows 默认开加速，但曲线不同，所以也感觉不对）
    accel_profile = flat

    # 鼠标灵敏度：0 为默认，负值变慢，正值变快（范围 -1.0 ~ 1.0）
    # 根据手感调整，Windows 6/11 档约对应 -0.2 ~ 0.0
    sensitivity = 0.5

    # 点击聚焦：鼠标移动不自动切换窗口焦点
    follow_mouse = 0
    float_switch_override_focus = 0

    # 浮动窗口切换：切入浮动时自动缩小到 60% 并居中
    unbind = Super+Alt, Space
    bind = Super+Alt, Space, exec, bash -c 'F=$(hyprctl activewindow -j|python3 -c "import sys,json;print(json.load(sys.stdin).get(\"floating\"))");if [ "$F" = True ];then hyprctl dispatch togglefloating;else hyprctl dispatch togglefloating;sleep .05;hyprctl dispatch resizeactive exact 60% 60%;hyprctl dispatch centerwindow;fi'

    # 浮动窗口拖拽：Super+左键移动, Super+右键缩放
}

$mainMod = SUPER # Sets "Windows" key as main modifier
# 禁用XWayland的缩放
xwayland {
  force_zero_scaling = true
}

# fcitx5
exec-once = fcitx5

# XWayland 缩放补偿：force_zero_scaling 阻止模糊，Xft.dpi 补偿字体大小
# 96 × 1.6 = 154 (适配你的 eDP-1 scale 1.6)
exec-once = echo 'Xft.dpi:154' | xrdb -merge

# 显示器配置 
monitorv2 {
	output = eDP-1
	mode = 2560x1600@300
	position = 0x0
	scale = 1.6
}

# 无限滚动设置
scrolling {
    # 默认列宽（屏幕宽度的百分比，0.1~1.0）
    column_width = 0.7

    # 当只有一列时，是否自动全屏
    fullscreen_on_one_column = true 
    
    # 新窗口添加方向：right/left/down/up
    direction = right 
    
    # 焦点跟随：窗口被聚焦时自动滚动使其可见
    follow_focus = true
    
    # 预置列宽列表，供快速切换使用
    explicit_column_widths = 0.2, 0.333, 0.5, 0.7, 0.92, 1.0

}

####################################################################
#                         user快捷键                               #
####################################################################
# 截图用 caelestia 自带：Print全屏 Super+Shift+S冻结区域 Super+Shift+Alt+S区域

# 禁用上游 Super+Shift+L 睡眠快捷键
unbind = Super+Shift, L

# 四指下滑 → 锁屏（上游睡眠手势已移到5指，不再冲突）
gesture = 4, down, dispatcher, exec, loginctl lock-session

# 关闭首次工作区跟踪（避免登录后首窗口跳到工作区1）
misc {
    initial_workspace_tracking = 0
}

# obs录屏：激活图形会话 + 导入 Wayland 环境 + 启动截图 portal
exec-once = systemctl --user start hyprland-session.service
exec-once = sh -c 'systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && sleep 2 && systemctl --user start xdg-desktop-portal.service xdg-desktop-portal-hyprland.service'

# 为所有窗口设置透明度
windowrule = opacity 0.9 0.9 0.9, match:class = .*

# wayland的模糊
layerrule = blur on, match:namespace ^waybar$
layerrule = blur on, match:namespace ^wofi$

# === 工作区创建与切换 ===
bind = $mainMod, L, workspace, e-1    # 切换到上一个工作区（跳过空的）
bind = $mainMod, H, workspace, e+1    # 切换到下一个工作区（跳过空的）

# ===== 窗口导航=====
bind = $mainMod, K, layoutmsg, focus r       # 向右滚动一列
bind = $mainMod, J,  layoutmsg, focus l      # 向左滚动一列

# ===== 列宽调整 =====
bind = $mainMod, W,  layoutmsg, colresize +0.05        # 加宽当前列
bind = $mainMod, B,  layoutmsg, colresize -0.05        # 缩窄当前列
bind = $mainMod CTRL, K, layoutmsg, colresize +conf  # 下一个预置宽度
bind = $mainMod CTRL, J,  layoutmsg, colresize -conf  # 上一个预置宽度

# ===== 高级操作 =====
# bind = $mainMod, p, layoutmsg, promote              # 当前窗口独占一列
bind = $mainMod SHIFT, K, layoutmsg, swapcol r  # 当前列与右列交换
bind = $mainMod SHIFT, J,  layoutmsg, swapcol l  # 当前列与左列交换
bind = $mainMod, y, layoutmsg, fit all              # 让所有窗口适应屏幕

# 仪表盘
bind = $mainMod, I, global, caelestia:dashboard

